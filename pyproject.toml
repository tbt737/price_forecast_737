[project]
name = "commodity-quant-platform"
version = "0.2.0"
description = "Generic, configuration-driven multi-commodity quant forecasting platform"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "SQLAlchemy>=2.0,<2.1",
    "alembic>=1.13",
    "psycopg[binary]>=3.1",
    "pydantic>=2.6",
    "pydantic-settings>=2.2",
    "PyYAML>=6.0",
    "python-dotenv>=1.0",
    "yfinance>=0.2",
    "requests>=2.31",
    "numpy>=1.26",
    "pandas>=2.0",
    "xgboost>=2.0",
    "PyWavelets>=1.4",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "httpx>=0.27",
    "ruff>=0.5",
    "mypy>=1.10",
]

# The FastAPI service (and the data layer it owns) lives under apps/api as the
# `app` package. Tests/type-checks resolve it via the paths below; no build/install
# step is required for development.
[tool.pytest.ini_options]
pythonpath = ["apps/api", "."]
testpaths = ["tests/quality", "tests/integration", "apps/api/tests", "ml/tests"]
addopts = "-ra"

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.flake8-bugbear]
# FastAPI uses Depends()/Query() in argument defaults by design — not a B008 bug.
extend-immutable-calls = ["fastapi.Depends", "fastapi.Query", "fastapi.Path", "fastapi.Body"]

[tool.ruff.lint.per-file-ignores]
# Alembic migrations are autogenerated; long Enum/Column lines are expected.
"apps/api/app/migrations/versions/*" = ["E501"]
# env.py uses a star-import to register all models on the metadata.
"apps/api/app/migrations/env.py" = ["F401", "F403"]
# seed script bootstraps sys.path before importing the app package.
"db/seeds/*" = ["E402"]
# MV builder holds long inline SQL query literals; splitting them risks altering the
# query text and hurts readability. Narrow, file-scoped E501 exemption only.
"ml/build_pandas_mv.py" = ["E501"]

[tool.mypy]
# Match CI / runtime (actions/setup-python 3.13). Keeping 3.11 makes mypy reject
# current NumPy stubs that use PEP 695 `type` aliases (CI: "Type statement is only
# supported in Python 3.12 and greater").
python_version = "3.13"
mypy_path = "apps/api"
explicit_package_bases = true
namespace_packages = true
warn_unused_ignores = true
ignore_missing_imports = true
