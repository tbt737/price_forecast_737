name: Daily ingestion

# Automated data collection. Runs the idempotent ingest CLI on a schedule and
# on manual dispatch. Requires a repository secret DATABASE_URL pointing at the
# platform database (e.g. the Supabase session-pooler connection string).
#
# NOTE: this runs only once the repo is pushed to GitHub and the DATABASE_URL
# secret is configured (Settings → Secrets and variables → Actions).

on:
  schedule:
    - cron: "0 22 * * *" # daily 22:00 UTC, after US futures settle
  workflow_dispatch: {} # allow manual runs from the Actions tab

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -r requirements.txt
      # Critical path: append today's market prices via the robust backfill path
      # (ON CONFLICT DO NOTHING) so recent-date provenance conflicts cannot roll back
      # the batch and freeze the data. A failure here fails the job.
      - name: Ingest daily prices
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m etl.ingest --backfill --sources prices --period 1mo

      # Vietnam DOMESTIC prices. Uses the BACKFILL path (per-record ON CONFLICT DO NOTHING),
      # NOT the all-or-nothing write batch — a single provenance conflict (e.g. a re-run
      # after PNJ revised today's price) must not roll back and permanently drop the other
      # rows of a today-only source. vn_history tops up GOLD_VN's forecast-primary SJC
      # series (VNAPPMOB_SJC_1L) daily so it can grow past MIN_HISTORY; a short 7-day window
      # is self-healing (fills any recently-missed day). Non-blocking: a scraped-endpoint
      # failure must never fail the futures feed — the freshness gate surfaces VN staleness.
      - name: Ingest VN domestic prices (non-blocking)
        if: always()
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -m etl.ingest --backfill --sources vn_prices
          python -m etl.ingest --backfill --sources vn_history --history-days 7

      # VN30 listed equities (30 HOSE blue chips): same self-healing 7-day top-up
      # pattern as vn_history. Inert until the equity profiles + ENTRADE source are
      # seeded in the target DB (unknown codes are rejected cleanly, not crashed).
      - name: Ingest VN30 equities (non-blocking)
        if: always()
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m etl.ingest --backfill --sources vn_stocks --history-days 7

      # Non-critical exogenous sources must never block the price feed. NOAA is
      # fail-soft in code; these steps are also continue-on-error so a flaky upstream
      # cannot turn CI red on its own.
      - name: Ingest macro FX (non-blocking)
        if: always()
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m etl.ingest --backfill --sources macro --period 1mo

      - name: Ingest weather + events (non-blocking)
        if: always()
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -m etl.ingest --backfill --sources weather
          python -m etl.ingest --backfill --sources events

      # Freshness gate (read-only): the run is green ONLY if futures prices actually
      # advanced to the previous business day or later — a green run can no longer mean
      # "didn't crash while data is stale".
      - name: Freshness gate
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/check_freshness.py
