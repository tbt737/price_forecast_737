# Ingestion source registry — config-over-code.
# Connectors read THIS file (symbols, tickers, coordinates), never hardcoded per
# commodity. Add a commodity here to ingest it; do not edit connector engines.
# Unknown instrument/region codes are rejected cleanly by the pipeline, not crashed.

prices:
  source_code: yahoo # must exist in dim_data_source (seeded by seed_ingestion_sources)
  release_lag_days: 1 # close is treated as available the next day (point-in-time safe)
  # instrument_code must exist in dim_market_instrument; ticker is the Yahoo Finance symbol.
  instruments:
    - { commodity_code: GOLD, instrument_code: COMEX_GC, ticker: "GC=F", currency: USD }
    - { commodity_code: CRUDE_OIL, instrument_code: NYMEX_CL, ticker: "CL=F", currency: USD }
    - { commodity_code: CORN, instrument_code: CME_ZC, ticker: "ZC=F", currency: USc }
    - { commodity_code: WHEAT, instrument_code: CME_ZW, ticker: "ZW=F", currency: USc }
    - { commodity_code: SOYBEAN, instrument_code: CME_ZS, ticker: "ZS=F", currency: USc }
    - { commodity_code: SUGAR, instrument_code: ICE_SB, ticker: "SB=F", currency: USc }
    - { commodity_code: COCOA, instrument_code: ICE_CC, ticker: "CC=F", currency: USD }
    - { commodity_code: COPPER, instrument_code: COMEX_HG, ticker: "HG=F", currency: USD }
    - { commodity_code: RICE, instrument_code: CME_ZR, ticker: "ZR=F", currency: USD } # CBOT rough rice
    # FREIGHT: Baltic Dry has no Yahoo feed; BDRY (Breakwave Dry Bulk ETF) is a tradable proxy.
    - { commodity_code: FREIGHT_INDICES, instrument_code: BDI, ticker: "BDRY", currency: USD }

weather:
  source_code: NASA_POWER
  release_lag_days: 3 # NASA POWER has a few-days publication latency
  parameters: # NASA POWER api param -> our metric_code
    T2M: temp_mean
    PRECTOTCORR: precip
  # region_code must exist in dim_region; latitude/longitude drive the NASA POWER point query.
  locations:
    - { commodity_code: ROBUSTA, region_code: VN_TAY_NGUYEN, latitude: 12.7, longitude: 108.1 }
    # Indian growing belts for the produce series (drive supply -> price via monsoon):
    - { commodity_code: RED_ONION_INDIA, region_code: IN_NASHIK, latitude: 20.0, longitude: 73.79 }
    - { commodity_code: INDIAN_CHILIES, region_code: IN_GUNTUR, latitude: 16.31, longitude: 80.44 }
    # Indian garlic belt (Mandsaur, Madhya Pradesh) — proxy origin for the garlic series:
    - { commodity_code: CHINESE_GARLIC, region_code: IN_MADHYA_PRADESH, latitude: 24.07, longitude: 75.07 }

macro:
  source_code: yahoo # Yahoo FX series; written to fact_macro_daily (shared, no commodity)
  release_lag_days: 1
  # indicator_code is free-text on fact_macro_daily. FX/dollar drivers referenced by
  # profiles' macro_drivers (usd_inr, usd_cny). Collected for the Drivers view; NOT a
  # forecast feature — backtests show FX gives no robust accuracy gain on these series.
  indicators:
    - { indicator_code: usd_inr, ticker: "INR=X", unit: "INR per USD" }
    - { indicator_code: usd_cny, ticker: "CNY=X", unit: "CNY per USD" }
    - { indicator_code: dollar_index, ticker: "DX-Y.NYB", unit: "DXY index" }

events:
  source_code: NOAA
  release_lag_days: 10
  metrics:
    - { metric_code: el_nino_la_nina, category: "climate", description: "NOAA Oceanic Nino Index" }

supply_demand:
  source_code: USDA_FAS
  release_lag_days: 0
  # Attribute_IDs for liquid roles are verified against psd_alldata_csv.zip
  # (see configs/ingestion/usda_psd_attribute_catalog.yaml). Do not invent IDs.
  #
  # country_code is REQUIRED (PSD Country_Code): PSD bulk has NO world-aggregate row,
  # so one series = one benchmark country. The connector filters exactly that country
  # and writes it into the record region + provenance id (no cross-country merging).
  # region_code is OUR dim_region code (differs from PSD code for CH->CN, VM->VN).
  # Per-metric country_code/region_code override the series default (used by SUGAR).
  series:
    # Coffee (legacy metric names — not the mechanistic triad). Vietnam = the
    # profile's robusta origin; VM verified 66/66 positive MYs for 28/88/178.
    - { commodity_code: ROBUSTA, usda_commodity_id: "0711100", country_code: VM, region_code: VN,
        metrics: { "production_estimate": 28, "exportable_surplus": 88, "certified_stocks": 178 } }
    # Liquid ag — roles planted_area / import_volume / inventory (mechanistic aliases).
    # US benchmark: 67/67 (CORN, WHEAT) / 63/63 (SOYBEAN) positive MYs on all 3 roles.
    - commodity_code: CORN
      usda_commodity_id: "0440000"
      country_code: US
      region_code: US
      metrics:
        planted_area: { attribute_id: 4, unit: "(1000 HA)", usda_attribute: "Area Harvested" }
        import_volume: { attribute_id: 57, unit: "(1000 MT)", usda_attribute: "Imports" }
        inventory: { attribute_id: 176, unit: "(1000 MT)", usda_attribute: "Ending Stocks" }
    - commodity_code: WHEAT
      usda_commodity_id: "0410000"
      country_code: US
      region_code: US
      metrics:
        planted_area: { attribute_id: 4, unit: "(1000 HA)", usda_attribute: "Area Harvested" }
        import_volume: { attribute_id: 57, unit: "(1000 MT)", usda_attribute: "Imports" }
        inventory: { attribute_id: 176, unit: "(1000 MT)", usda_attribute: "Ending Stocks" }
    - commodity_code: SOYBEAN
      usda_commodity_id: "2222000"  # Oilseed, Soybean
      country_code: US
      region_code: US
      metrics:
        planted_area: { attribute_id: 4, unit: "(1000 HA)", usda_attribute: "Area Harvested" }
        import_volume: { attribute_id: 57, unit: "(1000 MT)", usda_attribute: "Imports" }
        inventory: { attribute_id: 176, unit: "(1000 MT)", usda_attribute: "Ending Stocks" }
    # Sugar: PSD publishes Imports + Ending Stocks only (no Area Harvested/Planted).
    # Per-role countries (audited): imports signal = China (largest buyer, 66/67 npos);
    # inventory signal = India (largest managed stockholder, 67/67 npos). Brazil is the
    # export anchor but imports ~0 (npos 5/67) — a single common country has no signal.
    - commodity_code: SUGAR
      usda_commodity_id: "0612000"  # Sugar, Centrifugal
      metrics:
        import_volume: { attribute_id: 57, unit: "(1000 MT)", usda_attribute: "Imports",
                         country_code: CH, region_code: CN }
        inventory: { attribute_id: 176, unit: "(1000 MT)", usda_attribute: "Ending Stocks",
                     country_code: IN, region_code: IN }
    # Rice: Thailand benchmark exporter — 67/67 positive MYs on planted_area + inventory
    # (Vietnam inventory only 32/67 positive; US is a minor producer).
    - commodity_code: RICE
      usda_commodity_id: "0422110"  # Rice, Milled
      country_code: TH
      region_code: TH
      metrics:
        planted_area: { attribute_id: 4, unit: "(1000 HA)", usda_attribute: "Area Harvested" }
        import_volume: { attribute_id: 57, unit: "(1000 MT)", usda_attribute: "Imports" }
        inventory: { attribute_id: 176, unit: "(1000 MT)", usda_attribute: "Ending Stocks" }
    # COCOA omitted: no Cocoa/Cacao commodity in USDA PSD bulk (catalog note).

vn_prices:
  # Vietnam DOMESTIC spot prices (VND). Each endpoint names a parser FORMAT handled by
  # etl.sources.market.vn_domestic.PARSERS — never a per-commodity code path. These
  # sources publish only today's price, so each run writes one row per instrument.
  release_lag_days: 0 # domestic spot — available same day
  endpoints:
    - { commodity_code: GOLD_VN, instrument_code: PNJ_SJC, source_code: PNJ, parser: pnj_json,
        url: "https://edge-api.pnj.io/ecom-frontend/v1/get-gold-price", product_key: "SJC", currency: VND }
    - { commodity_code: GOLD_VN, instrument_code: PNJ_NHAN9999, source_code: PNJ, parser: pnj_json,
        url: "https://edge-api.pnj.io/ecom-frontend/v1/get-gold-price", product_key: "N24K", currency: VND }
    - { commodity_code: SILVER_VN, instrument_code: PQ_BAC_MIENG999, source_code: PHU_QUY, parser: phuquy_silver_html,
        url: "https://giabac.phuquygroup.vn/PhuQuyPrice/SilverPricePartial", product_key: "BẠC MIẾNG PHÚ QUÝ 999 1 LƯỢNG", currency: VND }
    - { commodity_code: PEPPER_VN, instrument_code: GIATIEU_TB, source_code: GIATIEU, parser: giatieu_html,
        url: "https://giatieu.com/gia-tieu-hom-nay/", product_key: "TRUNG_BINH", currency: VND }
    # Petrolimex retail fuel board (administered price, VNĐ/lít, Zone 1). The CMS search
    # API takes a base64 "x-request" query (filter = the published price items); the
    # response is {"Objects":[{"Title","Zone1Price","Zone2Price",...}]} — product_key
    # matches Title. Price steps only on MoIT adjustment days (~weekly).
    - { commodity_code: DIESEL_VN, instrument_code: PLX_DO_005S, source_code: PETROLIMEX, parser: petrolimex_json,
        url: "https://portals.petrolimex.com.vn/~apis/portals/cms.item/search?x-%3D",
        product_key: "DO 0,05S-II", currency: VND }
    - { commodity_code: DIESEL_VN, instrument_code: PLX_DO_0001S, source_code: PETROLIMEX, parser: petrolimex_json,
        url: "https://portals.petrolimex.com.vn/~apis/portals/cms.item/search?x-%3D",
        product_key: "DO 0,001S-V", currency: VND }

vn_history:
  # Vietnam domestic HISTORICAL prices via a date-range API (VNAppMob). ADDITIVE — a new
  # instrument alongside the PNJ spot feed, giving GOLD_VN real multi-month history to
  # forecast from. parser names a FORMAT in vn_domestic.HISTORY_PARSERS. The free token is
  # minted per run from key_url and never stored. NOT part of the daily "all" run.
  release_lag_days: 1
  chunk_days: 300 # the API caps very wide windows; request in <=300-day chunks
  endpoints:
    - { commodity_code: GOLD_VN, instrument_code: VNAPPMOB_SJC_1L, source_code: VNAPPMOB, parser: vnappmob_gold,
        key_url: "https://vapi.vnappmob.com/api/request_api_key?scope=gold",
        data_url: "https://vapi.vnappmob.com/api/v2/gold/sjc",
        field: sell_1l, buy_field: buy_1l, currency: VND }

vn_stocks:
  # Vietnamese listed-equity daily bars (HOSE blue chips / VN30 basket) via a public
  # chart API returning TradingView-style t/o/h/l/c/v arrays. parser names a FORMAT in
  # etl.sources.market.vn_stocks.STOCK_HISTORY_PARSERS — never a per-ticker code path.
  # Quotes are published in thousands of VND; scale rescales to full VND at ingest.
  # Date-range source: runs ONLY via --sources vn_stocks. Initial empty-store load uses
  # --backfill; daily top-up uses --reconcile (revision-aware). Adjusted prices
  # (corporate actions) are healed by etl/restatement.py — do NOT use append-only
  # --backfill after an instrument already has history (see PLAN.md §5 / docs).
  source_code: ENTRADE
  release_lag_days: 0 # HOSE close (15:00 ICT) is published the same day
  parser: chart_arrays_json
  scale: 1000
  # Restatement reconcile (etl/restatement.py): anchors are recent stored dates
  # re-fetched and compared; a relative mismatch > epsilon_pct on any anchor means
  # the source restated its history (corporate action) and the FULL series is
  # re-inserted at revision+1 with release_date=reconcile day (PIT-safe). Old
  # revisions stay for audit. min_reload_coverage guards against a truncated
  # response silently shortening the canonical series. jump_alert_pct only WARNS.
  reconcile:
    epsilon_pct: 0.5
    anchor_days: 5
    jump_alert_pct: 15
    deep_from: "2000-01-01"
    min_reload_coverage: 0.9
  url_template: "https://services.entrade.com.vn/chart-api/v2/ohlcs/stock?from={ts_from}&to={ts_to}&symbol={ticker}&resolution=1D"
  # Basket = VN30 effective 2026-02-02 (Jan-2026 HOSE review: VPL in, BCM out).
  # HOSE revises the basket semiannually (Jan/Jul, effective early Feb/Aug) —
  # update these endpoints + the matching profiles on each review.
  endpoints:
    - { commodity_code: ACB_VN, instrument_code: HOSE_ACB, ticker: ACB }
    - { commodity_code: BID_VN, instrument_code: HOSE_BID, ticker: BID }
    - { commodity_code: BVH_VN, instrument_code: HOSE_BVH, ticker: BVH }
    - { commodity_code: CTG_VN, instrument_code: HOSE_CTG, ticker: CTG }
    - { commodity_code: FPT_VN, instrument_code: HOSE_FPT, ticker: FPT }
    - { commodity_code: GAS_VN, instrument_code: HOSE_GAS, ticker: GAS }
    - { commodity_code: GVR_VN, instrument_code: HOSE_GVR, ticker: GVR }
    - { commodity_code: HDB_VN, instrument_code: HOSE_HDB, ticker: HDB }
    - { commodity_code: HPG_VN, instrument_code: HOSE_HPG, ticker: HPG }
    - { commodity_code: LPB_VN, instrument_code: HOSE_LPB, ticker: LPB }
    - { commodity_code: MBB_VN, instrument_code: HOSE_MBB, ticker: MBB }
    - { commodity_code: MSN_VN, instrument_code: HOSE_MSN, ticker: MSN }
    - { commodity_code: MWG_VN, instrument_code: HOSE_MWG, ticker: MWG }
    - { commodity_code: PLX_VN, instrument_code: HOSE_PLX, ticker: PLX }
    - { commodity_code: SAB_VN, instrument_code: HOSE_SAB, ticker: SAB }
    - { commodity_code: SHB_VN, instrument_code: HOSE_SHB, ticker: SHB }
    - { commodity_code: SSB_VN, instrument_code: HOSE_SSB, ticker: SSB }
    - { commodity_code: SSI_VN, instrument_code: HOSE_SSI, ticker: SSI }
    - { commodity_code: STB_VN, instrument_code: HOSE_STB, ticker: STB }
    - { commodity_code: TCB_VN, instrument_code: HOSE_TCB, ticker: TCB }
    - { commodity_code: TPB_VN, instrument_code: HOSE_TPB, ticker: TPB }
    - { commodity_code: VCB_VN, instrument_code: HOSE_VCB, ticker: VCB }
    - { commodity_code: VHM_VN, instrument_code: HOSE_VHM, ticker: VHM }
    - { commodity_code: VIB_VN, instrument_code: HOSE_VIB, ticker: VIB }
    - { commodity_code: VIC_VN, instrument_code: HOSE_VIC, ticker: VIC }
    - { commodity_code: VJC_VN, instrument_code: HOSE_VJC, ticker: VJC }
    - { commodity_code: VNM_VN, instrument_code: HOSE_VNM, ticker: VNM }
    - { commodity_code: VPB_VN, instrument_code: HOSE_VPB, ticker: VPB }
    - { commodity_code: VPL_VN, instrument_code: HOSE_VPL, ticker: VPL }
    - { commodity_code: VRE_VN, instrument_code: HOSE_VRE, ticker: VRE }

monitoring:
  # Freshness/coverage gate groups (scripts/check_freshness.py) — config-over-code, no
  # hardcoded ticker list. max_gap_days = tolerated calendar staleness before a group is
  # STALE. critical groups fail the daily gate (red run); non-critical (scraped VN spot
  # sources that can die silently) are WARNINGs by default and only fail under --strict.
  groups:
    - name: futures
      critical: true
      max_gap_days: 3 # Mon expects Fri (3 calendar days); catches a frozen feed
      commodities: [GOLD, CRUDE_OIL, CORN, WHEAT, COPPER, SUGAR, SOYBEAN, COCOA, RICE, FREIGHT_INDICES]
    - name: vn_domestic
      critical: false
      max_gap_days: 4 # scraped spot; a dead PNJ/Phú Quý/VNAppMob endpoint is surfaced
      commodities: [GOLD_VN, SILVER_VN, PEPPER_VN, DIESEL_VN]
    - name: vn_stocks
      critical: false
      max_gap_days: 5 # daily bars incl. long holiday weekends (Tết gaps stay WARNING-only)
      commodities: [ACB_VN, BID_VN, BVH_VN, CTG_VN, FPT_VN, GAS_VN, GVR_VN, HDB_VN,
                    HPG_VN, LPB_VN, MBB_VN, MSN_VN, MWG_VN, PLX_VN, SAB_VN, SHB_VN,
                    SSB_VN, SSI_VN, STB_VN, TCB_VN, TPB_VN, VCB_VN, VHM_VN, VIB_VN,
                    VIC_VN, VJC_VN, VNM_VN, VPB_VN, VPL_VN, VRE_VN]
