# Ingestion source registry — config-over-code.
# Connectors read THIS file (symbols, tickers, coordinates), never hardcoded per
# commodity. Add a commodity here to ingest it; do not edit connector engines.
# Unknown instrument/region codes are rejected cleanly by the pipeline, not crashed.

prices:
  source_code: yahoo # must exist in dim_data_source (seeded by seed_ingestion_sources)
  release_lag_days: 1 # close is treated as available the next day (point-in-time safe)
  # instrument_code must exist in dim_market_instrument; ticker is the Yahoo Finance symbol.
  instruments:
    - { commodity_code: GOLD, instrument_code: COMEX_GC, ticker: "GC=F", currency: USD }
    - { commodity_code: CRUDE_OIL, instrument_code: NYMEX_CL, ticker: "CL=F", currency: USD }
    - { commodity_code: CORN, instrument_code: CME_ZC, ticker: "ZC=F", currency: USc }
    - { commodity_code: WHEAT, instrument_code: CME_ZW, ticker: "ZW=F", currency: USc }
    - { commodity_code: SOYBEAN, instrument_code: CME_ZS, ticker: "ZS=F", currency: USc }
    - { commodity_code: SUGAR, instrument_code: ICE_SB, ticker: "SB=F", currency: USc }
    - { commodity_code: COCOA, instrument_code: ICE_CC, ticker: "CC=F", currency: USD }
    - { commodity_code: COPPER, instrument_code: COMEX_HG, ticker: "HG=F", currency: USD }
    - { commodity_code: RICE, instrument_code: CME_ZR, ticker: "ZR=F", currency: USD } # CBOT rough rice
    # FREIGHT: Baltic Dry has no Yahoo feed; BDRY (Breakwave Dry Bulk ETF) is a tradable proxy.
    - { commodity_code: FREIGHT_INDICES, instrument_code: BDI, ticker: "BDRY", currency: USD }

weather:
  source_code: NASA_POWER
  release_lag_days: 3 # NASA POWER has a few-days publication latency
  parameters: # NASA POWER api param -> our metric_code
    T2M: temp_mean
    PRECTOTCORR: precip
  # region_code must exist in dim_region; latitude/longitude drive the NASA POWER point query.
  locations:
    - { commodity_code: ROBUSTA, region_code: VN_TAY_NGUYEN, latitude: 12.7, longitude: 108.1 }
    # Indian growing belts for the produce series (drive supply -> price via monsoon):
    - { commodity_code: RED_ONION_INDIA, region_code: IN_NASHIK, latitude: 20.0, longitude: 73.79 }
    - { commodity_code: INDIAN_CHILIES, region_code: IN_GUNTUR, latitude: 16.31, longitude: 80.44 }
    # Indian garlic belt (Mandsaur, Madhya Pradesh) — proxy origin for the garlic series:
    - { commodity_code: CHINESE_GARLIC, region_code: IN_MADHYA_PRADESH, latitude: 24.07, longitude: 75.07 }

macro:
  source_code: yahoo # Yahoo FX series; written to fact_macro_daily (shared, no commodity)
  release_lag_days: 1
  # indicator_code is free-text on fact_macro_daily. FX/dollar drivers referenced by
  # profiles' macro_drivers (usd_inr, usd_cny). Collected for the Drivers view; NOT a
  # forecast feature — backtests show FX gives no robust accuracy gain on these series.
  indicators:
    - { indicator_code: usd_inr, ticker: "INR=X", unit: "INR per USD" }
    - { indicator_code: usd_cny, ticker: "CNY=X", unit: "CNY per USD" }
    - { indicator_code: dollar_index, ticker: "DX-Y.NYB", unit: "DXY index" }

events:
  source_code: NOAA
  release_lag_days: 10
  metrics:
    - { metric_code: el_nino_la_nina, category: "climate", description: "NOAA Oceanic Nino Index" }

supply_demand:
  source_code: USDA_FAS
  release_lag_days: 0
  series:
    # PSD parameters are identified by their 'attributeId'. We map them to our metric_code.
    # Coffee PSD commodity code is '0711100'
    - { commodity_code: ROBUSTA, usda_commodity_id: "0711100", metrics: { "production_estimate": 28, "exportable_surplus": 88, "certified_stocks": 178 } }

vn_prices:
  # Vietnam DOMESTIC spot prices (VND). Each endpoint names a parser FORMAT handled by
  # etl.sources.market.vn_domestic.PARSERS — never a per-commodity code path. These
  # sources publish only today's price, so each run writes one row per instrument.
  release_lag_days: 0 # domestic spot — available same day
  endpoints:
    - { commodity_code: GOLD_VN, instrument_code: PNJ_SJC, source_code: PNJ, parser: pnj_json,
        url: "https://edge-api.pnj.io/ecom-frontend/v1/get-gold-price", product_key: "SJC", currency: VND }
    - { commodity_code: GOLD_VN, instrument_code: PNJ_NHAN9999, source_code: PNJ, parser: pnj_json,
        url: "https://edge-api.pnj.io/ecom-frontend/v1/get-gold-price", product_key: "N24K", currency: VND }
    - { commodity_code: SILVER_VN, instrument_code: PQ_BAC_MIENG999, source_code: PHU_QUY, parser: phuquy_silver_html,
        url: "https://giabac.phuquygroup.vn/PhuQuyPrice/SilverPricePartial", product_key: "BẠC MIẾNG PHÚ QUÝ 999 1 LƯỢNG", currency: VND }

vn_history:
  # Vietnam domestic HISTORICAL prices via a date-range API (VNAppMob). ADDITIVE — a new
  # instrument alongside the PNJ spot feed, giving GOLD_VN real multi-month history to
  # forecast from. parser names a FORMAT in vn_domestic.HISTORY_PARSERS. The free token is
  # minted per run from key_url and never stored. NOT part of the daily "all" run.
  release_lag_days: 1
  chunk_days: 300 # the API caps very wide windows; request in <=300-day chunks
  endpoints:
    - { commodity_code: GOLD_VN, instrument_code: VNAPPMOB_SJC_1L, source_code: VNAPPMOB, parser: vnappmob_gold,
        key_url: "https://vapi.vnappmob.com/api/request_api_key?scope=gold",
        data_url: "https://vapi.vnappmob.com/api/v2/gold/sjc",
        field: sell_1l, buy_field: buy_1l, currency: VND }
