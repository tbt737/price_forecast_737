# Local CSV import registry — one-off historical backfills from downloaded
# datasets (e.g. Kaggle Agmarknet). CSV files live under data/ (gitignored).
# Config-over-code: map a dataset's columns/commodity to our codes here.
#
# Run:  python -m etl.ingest --csv-import <name>

imports:
  # Indian onion daily mandi prices (Lasalgaon benchmark) -> RED_ONION_INDIA.
  # Source: Kaggle arjunyadav99/indian-agricultural-mandi-prices-20232025 (Agmarknet).
  onion_india_lasalgaon:
    path: data/Agriculture_price_dataset.csv
    commodity_code: RED_ONION_INDIA
    instrument_code: IN_LASALGAON_SPOT
    currency: INR
    source_code: csv_import
    commodity_column: Commodity
    commodity_filter: Onion
    market_column: "Market Name"
    market_filter: Lasalgaon # benchmark onion market (Maharashtra)
    value_column: Modal_Price
    date_column: "Price Date"
    date_format: "%m/%d/%Y"
    aggregate: median # collapse multiple varieties/grades per day to one price

  # ── Kaggle khandelwalmanas/daily-commodity-prices-india (Agmarknet, per-year
  # files 2001-2026; columns: Commodity/Market/Arrival_Date/Modal_Price). We pull
  # 2022-2025 via the glob path. National daily median across all markets unless a
  # market filter is given. ──

  # Indian dry red chilli -> INDIAN_CHILIES (Guntur spot, the Indian benchmark).
  chilli_india:
    path: "data/202[2-5].csv"
    commodity_code: INDIAN_CHILIES
    instrument_code: IN_GUNTUR_SPOT
    currency: INR
    source_code: csv_import
    commodity_column: Commodity
    commodity_filter: Dry Chillies
    value_column: Modal_Price
    date_column: Arrival_Date
    date_format: "%Y-%m-%d"
    aggregate: median # national daily median across markets

  # Indian garlic -> CHINESE_GARLIC as a PROXY (no free Chinese-garlic feed is
  # reachable; Indian garlic stands in). Value is INR, mapped onto the Jinxiang
  # instrument purely as a placeholder series — treat as a proxy, not CN spot.
  garlic_india_proxy:
    path: "data/202[2-5].csv"
    commodity_code: CHINESE_GARLIC
    instrument_code: CN_JINXIANG_SPOT
    currency: INR
    source_code: csv_import
    commodity_column: Commodity
    commodity_filter: Garlic
    value_column: Modal_Price
    date_column: Arrival_Date
    date_format: "%Y-%m-%d"
    aggregate: median

  # Extend the onion history back to 2022 (same Lasalgaon benchmark) -> RED_ONION_INDIA.
  onion_india_extended:
    path: "data/202[2-5].csv"
    commodity_code: RED_ONION_INDIA
    instrument_code: IN_LASALGAON_SPOT
    currency: INR
    source_code: csv_import
    commodity_column: Commodity
    commodity_filter: Onion
    market_column: Market
    market_filter: Lasalgaon
    value_column: Modal_Price
    date_column: Arrival_Date
    date_format: "%Y-%m-%d"
    aggregate: median

  # ════════════════════════════════════════════════════════════════════════════
  # 23-year NATIONAL-MEDIAN series (the forecastable benchmark) -> IN_NATIONAL_MEDIAN.
  # Stitched from two Agmarknet snapshots, both national daily median modal price:
  #   *_hist  = Kaggle vandeetshah/india-commodity-wise-mandi-dataset (per-commodity
  #             file, single commodity, 2001 -> 2024-02)
  #   *_fresh = Kaggle khandelwalmanas year files (2024-2025 tail)
  # The two agree on the overlap (median ratio 1.000), so importing *_hist first then
  # *_fresh (ON CONFLICT DO NOTHING) keeps the long history and only appends the tail.
  # IN_NATIONAL_MEDIAN then has the most data -> the forecaster selects it.
  # ════════════════════════════════════════════════════════════════════════════
  onion_national_hist:
    path: data/hist/Onion.csv
    commodity_code: RED_ONION_INDIA
    instrument_code: IN_NATIONAL_MEDIAN
    currency: INR
    source_code: csv_import
    value_column: "Modal Price (Rs./Quintal)"
    date_column: "Reported Date"
    date_format: "%d %b %Y"
    aggregate: median
  onion_national_fresh:
    path: "data/hist/202[45].csv"
    commodity_code: RED_ONION_INDIA
    instrument_code: IN_NATIONAL_MEDIAN
    currency: INR
    source_code: csv_import
    commodity_column: Commodity
    commodity_filter: Onion
    value_column: Modal_Price
    date_column: Arrival_Date
    date_format: "%Y-%m-%d"
    aggregate: median

  chilli_national_hist:
    path: data/hist/Dry_Chillies.csv
    commodity_code: INDIAN_CHILIES
    instrument_code: IN_NATIONAL_MEDIAN
    currency: INR
    source_code: csv_import
    value_column: "Modal Price (Rs./Quintal)"
    date_column: "Reported Date"
    date_format: "%d %b %Y"
    aggregate: median
  chilli_national_fresh:
    path: "data/hist/202[45].csv"
    commodity_code: INDIAN_CHILIES
    instrument_code: IN_NATIONAL_MEDIAN
    currency: INR
    source_code: csv_import
    commodity_column: Commodity
    commodity_filter: Dry Chillies
    value_column: Modal_Price
    date_column: Arrival_Date
    date_format: "%Y-%m-%d"
    aggregate: median

  garlic_national_hist:
    path: data/hist/Garlic.csv
    commodity_code: CHINESE_GARLIC
    instrument_code: IN_NATIONAL_MEDIAN
    currency: INR
    source_code: csv_import
    value_column: "Modal Price (Rs./Quintal)"
    date_column: "Reported Date"
    date_format: "%d %b %Y"
    aggregate: median
  garlic_national_fresh:
    path: "data/hist/202[45].csv"
    commodity_code: CHINESE_GARLIC
    instrument_code: IN_NATIONAL_MEDIAN
    currency: INR
    source_code: csv_import
    commodity_column: Commodity
    commodity_filter: Garlic
    value_column: Modal_Price
    date_column: Arrival_Date
    date_format: "%Y-%m-%d"
    aggregate: median
